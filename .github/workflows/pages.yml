name: Scan and publish GitHub Pages

on:
  schedule:
    - cron: "0 1 * * *"   # daily 09:00 Beijing (UTC+8) = 01:00 UTC
  workflow_dispatch:
    inputs:
      accounts:
        description: "X accounts (comma-separated, e.g. elonmusk)"
        required: false
        default: "aleabitoreddit"
        type: string
      window_days:
        description: "Lookback window in days (X API ~63; older via guest backfill)"
        required: false
        default: "63"
        type: string
      max_posts:
        description: "Max posts to fetch per account"
        required: false
        default: "4000"
        type: string
      max_pages:
        description: "Max API/guest pages per account"
        required: false
        default: "40"
        type: string

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  scan-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -q

      - name: Fetch existing gh-pages for history
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-prev
        continue-on-error: true

      - name: Build report site
        env:
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          python scripts/build_pages.py \
            --output site \
            --merge-from gh-pages-prev \
            --source x \
            --accounts "${{ github.event.inputs.accounts || 'aleabitoreddit' }}" \
            --window-days "${{ github.event.inputs.window_days || '63' }}" \
            --limit "${{ github.event.inputs.max_posts || '4000' }}" \
            --max-pages "${{ github.event.inputs.max_pages || '40' }}"

      - name: MySQL coverage report
        env:
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        run: |
          python scripts/mysql_coverage.py \
            --accounts "${{ github.event.inputs.accounts || 'aleabitoreddit' }}" \
            --window-days "${{ github.event.inputs.window_days || '63' }}"

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: false
          keep_files: true
          commit_message: "chore: add CI scan report"
