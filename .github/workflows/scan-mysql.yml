name: Scan MySQL (X fetch)

on:
  schedule:
    - cron: "0 1 * * *"   # daily 09:00 Beijing (UTC+8) = 01:00 UTC
  workflow_dispatch:
    inputs:
      accounts:
        description: "X accounts (comma-separated, e.g. elonmusk)"
        required: false
        default: "aleabitoreddit"
        type: string
      window_days:
        description: "Lookback window in days (X API ~63; older via guest backfill)"
        required: false
        default: "63"
        type: string
      max_posts:
        description: "Max posts to fetch per account (auto-scaled when window > 63)"
        required: false
        default: "4000"
        type: string
      max_pages:
        description: "Max API/guest pages per account (auto-scaled when window > 63)"
        required: false
        default: "40"
        type: string

concurrency:
  group: scan-mysql
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -q

      - name: Resolve fetch caps
        id: caps
        run: |
          eval "$(python scripts/ci_fetch_caps.py \
            --window-days "${{ github.event.inputs.window_days || '63' }}" \
            --max-posts "${{ github.event.inputs.max_posts || '4000' }}" \
            --max-pages "${{ github.event.inputs.max_pages || '40' }}")"
          echo "max_posts=$MAX_POSTS" >> "$GITHUB_OUTPUT"
          echo "max_pages=$MAX_PAGES" >> "$GITHUB_OUTPUT"
          echo "guest_prefetch=$GUEST_PREFETCH" >> "$GITHUB_OUTPUT"
          python scripts/ci_fetch_caps.py \
            --window-days "${{ github.event.inputs.window_days || '63' }}" \
            --max-posts "$MAX_POSTS" \
            --max-pages "$MAX_PAGES" \
            --format json

      - name: Guest pre-API prefetch (extended window)
        if: steps.caps.outputs.guest_prefetch == '1'
        env:
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        run: |
          python scripts/extended_prefetch.py \
            --accounts "${{ github.event.inputs.accounts || 'aleabitoreddit' }}" \
            --window-days "${{ github.event.inputs.window_days || '63' }}" \
            --max-posts "${{ steps.caps.outputs.max_posts }}" \
            --max-pages "${{ steps.caps.outputs.max_pages }}"

      - name: Fetch into MySQL
        env:
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          python scripts/scan_mysql.py \
            --source x \
            --accounts "${{ github.event.inputs.accounts || 'aleabitoreddit' }}" \
            --window-days "${{ github.event.inputs.window_days || '63' }}" \
            --limit "${{ steps.caps.outputs.max_posts }}" \
            --max-pages "${{ steps.caps.outputs.max_pages }}"

      - name: MySQL coverage report
        env:
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        run: |
          python scripts/mysql_coverage.py \
            --accounts "${{ github.event.inputs.accounts || 'aleabitoreddit' }}" \
            --window-days "${{ github.event.inputs.window_days || '63' }}"
